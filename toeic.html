<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多益單字練習</title>
<style>
  :root {
    --bg: #f7f7f2; --card: #ffffff; --ink: #2d2d2d; --sub: #8a8a84;
    --accent: #4a7c59; --accent-soft: #e6efe9;
    --wrong: #c0504d; --wrong-soft: #f6e4e3;
    --gold: #d9a441; --line: #e8e8e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--ink);
    max-width: 560px; margin: 0 auto; padding: 20px 16px 48px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--sub); font-size: 14px; margin-bottom: 20px; }
  .hidden { display: none !important; }

  .level-block { margin-bottom: 24px; }
  .level-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .level-head h2 { font-size: 17px; }
  .level-head span { color: var(--sub); font-size: 13px; }
  .units { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
  .unit {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 4px; text-align: center; cursor: pointer; font-size: 14px;
    transition: transform .08s;
  }
  .unit:active { transform: scale(.95); }
  .unit .score { display: block; font-size: 11px; color: var(--sub); margin-top: 3px; }
  .unit.done { background: var(--accent-soft); border-color: var(--accent); }
  .unit.done .score { color: var(--accent); font-weight: 600; }
  .unit.star { background: #faf3e3; border-color: var(--gold); }
  .unit.star .score { color: var(--gold); font-weight: 700; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .back { color: var(--sub); font-size: 14px; cursor: pointer; background: none; border: none; }
  .progress-text { font-size: 13px; color: var(--sub); }
  .bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 28px; }
  .bar > div { height: 100%; background: var(--accent); width: 0; transition: width .25s; }

  .word-card { text-align: center; margin-bottom: 28px; }
  .word { font-size: 40px; font-weight: 700; letter-spacing: .5px; }
  .phonetic { color: var(--sub); font-size: 16px; margin-top: 6px; }
  .speak {
    margin-top: 10px; background: var(--accent-soft); color: var(--accent);
    border: none; border-radius: 20px; padding: 6px 18px; font-size: 14px; cursor: pointer;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 16px; font-size: 16px; line-height: 1.5; text-align: left; cursor: pointer;
    transition: border-color .1s;
  }
  .opt.correct { background: var(--accent-soft); border-color: var(--accent); }
  .opt.wrong { background: var(--wrong-soft); border-color: var(--wrong); }
  .opt:disabled { cursor: default; color: var(--ink); opacity: 1; }
  .next-hint { text-align: center; color: var(--sub); font-size: 13px; margin-top: 16px; min-height: 18px; }

  .result { text-align: center; }
  .result .big { font-size: 52px; font-weight: 700; margin: 24px 0 4px; }
  .result .msg { color: var(--sub); margin-bottom: 24px; }
  .review { text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 4px 16px; margin-bottom: 24px; }
  .review-item { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .review-item:last-child { border-bottom: none; }
  .review-item b { font-size: 17px; }
  .review-item div { color: var(--sub); font-size: 14px; margin-top: 3px; line-height: 1.5; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; cursor: pointer;
    border: 1.5px solid var(--line); background: var(--card);
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
</head>
<body>

<div id="home">
  <h1>多益單字練習 🎯</h1>
  <p class="sub">1694 個核心單字，依常用程度分三級。每單元 20 字約 5 分鐘，答對 90% 以上拿 ⭐。</p>
  <div id="levels"></div>
</div>

<div id="quiz" class="hidden">
  <div class="topbar">
    <button class="back" onclick="goHome()">← 離開</button>
    <span class="progress-text" id="qProgress"></span>
  </div>
  <div class="bar"><div id="qBar"></div></div>
  <div class="word-card">
    <div class="word" id="qWord"></div>
    <div class="phonetic" id="qPhonetic"></div>
    <button class="speak" onclick="speak()">🔊 發音</button>
  </div>
  <div class="options" id="qOptions"></div>
  <div class="next-hint" id="qHint"></div>
</div>

<div id="result" class="hidden">
  <div class="result">
    <div class="big" id="rScore"></div>
    <div class="msg" id="rMsg"></div>
    <div class="review" id="rReview"></div>
    <div class="btn-row">
      <button class="btn" onclick="goHome()">回選單</button>
      <button class="btn primary" onclick="startUnit(cur.level, cur.unit)">再練一次</button>
    </div>
  </div>
</div>

"t": "circumstance3 ENTRIES FOUND:circumstance (noun)pomp (noun)reduce (verb)circumstance/ˈsɚkəmˌstæns/nounplural circumstancescircumstance/ˈsɚkəmˌstæns/ nounplural circumstancesLearner's definition of CIRCUMSTANCE1[count] : a condition or fact that affects a situation情況；條件I can't imagine a circumstance in/under which I would do that.我真想象不出自己在什麼情形下能做出那樣的事。— usually plural通常用複數If our business is to survive, we must be able to adapt to changing circumstances.如果我們想繼續把生意做下去，我們必須能夠適應千變萬化的環境。It is impossible under these circumstances to meet our deadline.在這樣的情況下，根本不可能如期完成。Do not, under any circumstances, open that door. = Under no circumstances are you to open that door. [=no matter what happens, do not open that door]無論如何都不要開啟那扇門。Due to circumstances beyond our control [=things that have happened that we cannot change or influence], the flight is canceled.由於出現無法控制的情況，航班被取消。There is nothing we can do under the circumstances. [=in this specific situation]在這種情況下，我們毫無辦法。Given the circumstances, I think we did well. [=when you consider how everything went, I think we did well]鑑於當時的情況，我認為我們做得夠好了。2circumstances [plural] : the way something happens : the specific details of an event情況；細節；詳情The circumstances of his death are suspicious.他死亡的情形十分可疑。3: an event or situation that you cannot control（非人力所能控制的）機緣，命運，機遇[noncount]She says that her client is a victim of circumstance and should not be blamed for the accident.她說她的委託人也是客觀環境的受害者，不應把事故的責任推給他。[plural]He was a victim of circumstances.他是客觀環境的犧牲品。4circumstances [plural] : the conditions in which someone lives境遇；境況；經濟狀況Their circumstances changed dramatically after she lost her job.她失業後他們的經濟狀況發生了巨大的變化。I don't know anything about his financial circumstances. [=about how much money he has]我對他的經濟狀況一無所知。They have been forced to live in reduced circumstances. [=to live with less money]他們被迫過著緊巴巴的日子。pomp and circumstance—see pomp"}, {"w": "identification", "p": "aɪˌdentɪfɪˈkeɪʃn", "t": "n. 鑑定, 驗明, 認出身份證明認同"}, {"w": "respond", "p": "rɪˈspɑː  jotted it down and agreed to come over to Mark's house in about fifteen minutes. Duke hunted along the dashboard for a pen and jotted a few things in the borders of a curling menu. She recited Sarah's phone number to Larisa who jotted it down on a piece of paper. His gaze never left them as he neatly jotted notes down on a small notepad. She ripped out a piece of paper from one of her notebooks and jotted it dow；n. He jotted it down in a small notebook I hadn't noticed him holding before. We talked for a while, and after her coins ran out I jotted the number on the wood beside my phone and called her back. An instant after the last letter was jotted down, someone knocked on the door. She then thought of some ideas, jotted them down and started to write some sentences. I quickly jotted it down and handed it to him, and he quickly pocketed it. Miller might have jotted the name down, but then, she would have isolated it. One of the two policemen jotted notes in a leather bound pad while the other talked to Rick. He moved behind her and rubbed her neck as she jotted a few ideas down on paper. I quickly jotted several things down in my notebook and mentally cackled. The waitress immediately took out a piece of paper and a pen from her apron and jotted the notes dow；n. She jotted it down on her notepad and glanced at me briefly before turning to head back to the counter. All kinds of snippets of ideas for tunes kept popping into my head so I jotted them dow；n. As I told him, he jotted it down on his clipboard and read it back to me. He measured the length, and the diameter of the dart, and jotted it down in his small notepad. He then jotted a note to her while discussing the importance of family and the strength of prayer. Synonymswrite down, note down, make a note of, take down, set down, put down, put on paper, mark downlog, record, list, register, enterscribble, scrawlnounPlural jots dʒɒtdʒɑtusually with negative A very small amount. you didn't care a jot I have yet to see one jot of evidence Example sentencesExamples The truth is, it doesn't matter, not a jot, not a tittle. And the fact that Lesley is a woman did not matter one jot. Even the scientists who advocate for that protocol recognise that it will not make one jot of difference, even if it is fully implemented. She smiled uneasily at her friend who looked very much as though she cared not a jot for her record. It's not bad but neither is it brilliant - which won't bother 99 per cent of buyers one jot as they are in it for the image. No, I won't give away a jot of the plot here; the movie does that nicely enough. But I suspect Ferguson doesn't care a jot about the opinion of his colleagues. The saddest aspect is that it probably won't matter a jot. It makes not one jot of difference that no actual blood is visible on their hands. They were so helpless and vulnerable, yet didn't seem to care a jot, wanting only to play and charge around. I have said that the circumstances do not deserve one jot of sympathy. With the greatest of respect to the Ireland captain, he would not have made a jot of difference against such physical and technical ability. I'm finally ready for Christmas, and there's not a jot of snow to be found. They don't even care a jot whether you like the result. There is not one jot of evidence that such an experience actually occurred in the infancy of one of Freud's patients. It is a mystery, but a delightful one, even if you care not a jot for genealogy. The Arts Council grant freeze doesn't surprise me one jot. On the other hand, I don't care a jot for any of that. Now this surprised me not a jot because, like most non-social workers, I am a firm believer that kids who are allowed to do as they please grow up to be monsters. We have not heard one jot of policy from the National Party today - not one jot. Synonymsiota, scrap, shred, whit, grain, crumb, ounce, little bit, bit, tiniest bit, jot or tittle, fraction, speck, atom, particle, scintilla, trace, hint, miteanyrap, hoot, figIrish stimFrench soupçoninformal smidgen, smidge, tad, damn, tinker's cuss, monkey'sAustralian/New Zealand informal skerrickarchaic scantling, scruple, smitchOriginLate 15th century (as a noun): via Latin from Greek iōta, the smallest letter of the Greek alphabet : see iota.Greek iōta (ι), the smallest letter of the Greek alphabet, gave us jot as a word for a very small amount—‘i’ and ‘j’ being interchangeable forms in medieval writing. To stress that someone cannot have any part of something, we might use the phrase not one jot or not one iota, which reflects the warning given by Jesus in St Matthew's Gospel that ‘Till heaven and earth pass, one jot or tittle shall in no wise pass from the law’ (a tittle here is a small stroke or accent). To jot something down appeared in the early 18th century and seems to have developed from the idea of a short sharp action as in writing a jot.Rhymesallot, begot, Bernadotte, blot, bot, capot, clot, cocotte, cot, culotte, dot, forgot, garrotte (US garrote), gavotte, got, grot, hot, knot, lot, Mayotte, motte, not, Ott, outshot, plot, pot, rot, sans-culotte, Scot, Scott, shallot, shot, slot, snot, sot, spot, squat, stot, swat, swot, tot, trot, undershot, Wat, Watt, what, wot, yachtDefinition of jot in US English: jot verbjätdʒɑt[with object]Write (something) quickly. when you've found the answers, jot them down Example sentencesExamples An instant after the last letter was jotted down, someone knocked on the door. One of the two policemen jotted notes in a leather bound pad while the other talked to Rick. She jotted it down on her notepad and glanced at me briefly before turning to head back to the counter. He measured the length, and the diameter of the dart, and jotted it down in his small notepad. He jotted it down in a small notebook I hadn't noticed him holding before. She then thought of some ideas, jotted them down and started to write some sentences. The waitress immediately took out a piece of paper const LEVEL_NAMES = { 1: "Level 1 基礎", 2: "Level 2 進階", 3: "Level 3 挑戰" };
const LEVEL_DESC = { 1: "最常用，先拿下", 2: "中頻字，穩紮穩打", 3: "低頻與專業字", };
let cur = { level: null, unit: null, order: [], idx: 0, wrong: [], locked: false };

function store() { try { return JSON.parse(localStorage.getItem("toeicQuiz") || "{}"); } catch (e) { return {}; } }
function saveScore(level, unit, pct) {
  const s = store();
  const key = level + "-" + unit;
  if (!(key in s) || pct > s[key]) s[key] = pct;
  localStorage.setItem("toeicQuiz", JSON.stringify(s));
}

function renderHome() {
  const s = store();
  const root = document.getElementById("levels");
  root.innerHTML = "";
  for (const lv of [1, 2, 3]) {
    const units = DATA[lv];
    const block = document.createElement("div");
    block.className = "level-block";
    block.innerHTML = '<div class="level-head"><h2>' + LEVEL_NAMES[lv] + "</h2><span>" +
      units.length + " 單元 · " + LEVEL_DESC[lv] + "</span></div>";
    const grid = document.createElement("div");
    grid.className = "units";
    units.forEach((u, i) => {
      const best = s[lv + "-" + i];
      const cell = document.createElement("div");
      cell.className = "unit" + (best >= 90 ? " star" : best != null ? " done" : "");
      cell.innerHTML = (i + 1) + '<span class="score">' +
        (best == null ? u.length + " 字" : best >= 90 ? "⭐ " + best + "%" : best + "%") + "</span>";
      cell.onclick = () => startUnit(lv, i);
      grid.appendChild(cell);
    });
    block.appendChild(grid);
    root.appendChild(block);
  }
}

function show(id) {
  for (const p of ["home", "quiz", "result"]) document.getElementById(p).classList.toggle("hidden", p !== id);
  window.scrollTo(0, 0);
}
function goHome() { renderHome(); show("home"); }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function startUnit(level, unit) {
  cur = { level, unit, order: shuffle(DATA[level][unit].map((w, i) => i)), idx: 0, wrong: [], locked: false };
  show("quiz");
  renderQuestion();
}

function currentWord() { return DATA[cur.level][cur.unit][cur.order[cur.idx]]; }

function renderQuestion() {
  const w = currentWord();
  const total = cur.order.length;
  document.getElementById("qProgress").textContent = (cur.idx + 1) + " / " + total;
  document.getElementById("qBar").style.width = (cur.idx / total * 100) + "%";
  document.getElementById("qWord").textContent = w.w;
  document.getElementById("qPhonetic").textContent = w.p ? "/" + w.p + "/" : "";
  document.getElementById("qHint").textContent = "";
  cur.locked = false;

  // 干擾選項：從同等級抽 3 個不同單字的釋義
  const pool = DATA[cur.level].flat().filter(x => x.w !== w.w);
  const distractors = shuffle(pool.slice()).slice(0, 3).map(x => x.t);
  const opts = shuffle([{ t: w.t, ok: true }].concat(distractors.map(t => ({ t, ok: false }))));

  const box = document.getElementById("qOptions");
  box.innerHTML = "";
  opts.forEach(o => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = o.t;
    b.onclick = () => answer(b, o.ok);
    box.appendChild(b);
  });
  speak();
}

function answer(btn, ok) {
  if (cur.locked) return;
  cur.locked = true;
  const w = currentWord();
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    if (b.textContent === w.t) b.classList.add("correct");
  });
  if (!ok) {
    btn.classList.add("wrong");
    cur.wrong.push(w);
    document.getElementById("qHint").textContent = "記下來：" + w.w + " → " + w.t;
  }
  setTimeout(next, ok ? 600 : 1800);
}

function next() {
  cur.idx++;
  if (cur.idx < cur.order.length) renderQuestion();
  else finish();
}

function finish() {
  const total = cur.order.length;
  const right = total - cur.wrong.length;
  const pct = Math.round(right / total * 100);
  saveScore(cur.level, cur.unit, pct);
  document.getElementById("rScore").textContent = pct + "%";
  document.getElementById("rMsg").textContent =
    pct === 100 ? "全對！太強了 🎉" :
    pct >= 90 ? "拿到 ⭐！答對 " + right + " / " + total :
    pct >= 70 ? "不錯！答對 " + right + " / " + total + "，錯的再看一眼" :
    "答對 " + right + " / " + total + "，這單元再練一次吧";
  const rv = document.getElementById("rReview");
  if (cur.wrong.length) {
    rv.classList.remove("hidden");
    rv.innerHTML = cur.wrong.map(w =>
      '<div class="review-item"><b>' + w.w + "</b> <span style='color:var(--sub)'>/" + w.p + "/</span><div>" + w.t + "</div></div>"
    ).join("");
  } else {
    rv.classList.add("hidden");
  }
  show("result");
}

function speak() {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentWord().w);
    u.lang = "en-US";
    u.rate = 0.9;
    speechSynthesis.speak(u);
  } catch (e) {}
}

renderHome();
</script>
