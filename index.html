<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>字寶</title>
<style>
  :root {
    --bg: #f7f7f2; --card: #ffffff; --ink: #2d2d2d; --sub: #8a8a84;
    --accent: #4a7c59; --accent-soft: #e6efe9;
    --wrong: #c0504d; --wrong-soft: #f6e4e3;
    --gold: #d9a441; --line: #e8e8e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--ink);
    max-width: 560px; margin: 0 auto; padding: 20px 16px 48px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .app-title { text-align: center; font-size: 46px; font-weight: 900; letter-spacing: 10px; text-indent: 10px; margin: 20px 0 6px; }
  .sub { color: var(--sub); font-size: 14px; margin-bottom: 20px; text-align: center; }
  .library-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 18px; padding: 16px; border-radius: 14px;
    font-size: 19px; font-weight: 700; color: var(--ink);
    background: var(--card); border: 1px solid var(--line); cursor: pointer;
    transition: transform .08s;
  }
  .library-btn:active { transform: scale(.98); }
  .lib-title { text-align: center; font-size: 34px; font-weight: 900; margin: 4px 0 20px; }
  h2 { font-size: 16px; margin: 22px 0 10px; }
  .hidden { display: none !important; }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 14px; color: var(--sub); margin-bottom: 8px; }
  .choices { display: flex; gap: 8px; flex-wrap: wrap; }
  .choice {
    border: 1.5px solid var(--line); background: var(--bg); border-radius: 10px;
    padding: 8px 16px; font-size: 15px; cursor: pointer;
  }
  .choice.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; cursor: pointer;
    border: 1.5px solid var(--line); background: var(--card);
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }

  .search-wrap { margin-bottom: 18px; }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 24px;
    padding: 8px 8px 8px 16px;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar .s-icon { color: var(--sub); font-size: 15px; }
  .search-bar input {
    flex: 1; border: none; outline: none; font-size: 16px;
    background: transparent; color: var(--ink); min-width: 0;
  }
  .s-btn { background: var(--accent); color: #fff; border: none; border-radius: 18px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
  .s-msg { color: var(--sub); font-size: 14px; margin-top: 10px; text-align: center; }
  .s-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-top: 10px; }
  .s-card .s-word { font-size: 22px; font-weight: 700; }
  .s-card .s-word span { color: var(--sub); font-size: 14px; font-weight: 400; }
  .s-card .s-zh { margin-top: 4px; font-size: 15px; }
  .s-card .s-en { margin-top: 6px; color: var(--sub); font-size: 14px; line-height: 1.5; }
  .s-card .btn { margin-top: 12px; }
  .badge { background: var(--gold); color: #fff; font-size: 11px; border-radius: 6px; padding: 1px 6px; margin-left: 4px; }

  .letter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .letter-cell {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 4px; text-align: center; cursor: pointer; transition: transform .08s;
  }
  .letter-cell:active { transform: scale(.95); }
  .letter-cell .lt { font-size: 22px; font-weight: 800; color: var(--accent); }
  .letter-cell .lc { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .letter-cell.empty .lt, .letter-cell.empty .lc { color: var(--line); }

  .letter-group { margin-bottom: 8px; }
  .letter-head {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 14px; cursor: pointer; font-weight: 700; font-size: 16px;
    color: var(--accent); user-select: none;
  }
  .letter-head .count { color: var(--sub); font-size: 13px; font-weight: 400; margin-left: 8px; }
  .letter-head .chev { color: var(--sub); font-size: 14px; transition: transform .15s; }
  .letter-head.open { background: var(--accent-soft); border-color: var(--accent); }
  .letter-head.open .chev { transform: rotate(90deg); }
  .letter-body { margin-top: 6px; padding-left: 4px; }
  .vocab-item { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: transform .08s; }
  .vocab-item:active { transform: scale(.98); }
  .vocab-item span { color: var(--sub); font-size: 13px; }
  .vocab-item .arrow { color: var(--line); font-size: 16px; }

  .overlay { position: fixed; inset: 0; background: rgba(45,45,45,.4); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  .detail { background: var(--card); border-radius: 18px; padding: 24px 22px; max-width: 480px; width: 100%; max-height: 82vh; overflow-y: auto; }
  .detail .dtop { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .detail .dword { font-size: 32px; font-weight: 700; }
  .detail .dphon { color: var(--sub); font-size: 16px; }
  .detail .dzh { font-size: 18px; margin-top: 6px; }
  .detail .dzh b { color: var(--gold); margin-right: 6px; }
  .detail .section { margin-top: 16px; }
  .detail .label { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
  .detail .val { font-size: 15px; line-height: 1.7; white-space: pre-line; }
  .detail .val em { color: var(--sub); }
  .detail .dfoot { margin-top: 18px; color: var(--sub); font-size: 12px; text-align: right; }
  .detail .btn-row { margin-top: 14px; }
  .nav-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--line);
    color: var(--accent); font-size: 24px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.12); z-index: 11;
  }
  .nav-arrow.left { left: 8px; }
  .nav-arrow.right { right: 8px; }
  .nav-arrow:disabled { opacity: .2; cursor: default; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .back { color: var(--sub); font-size: 14px; cursor: pointer; background: none; border: none; }
  .progress-text { font-size: 13px; color: var(--sub); }
  .bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 24px; }
  .bar > div { height: 100%; background: var(--accent); width: 0; transition: width .25s; }

  .clue { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
  .clue .zh { font-size: 22px; font-weight: 700; }
  .clue .pos { color: var(--gold); font-weight: 600; margin-right: 6px; }
  .clue .en { color: var(--sub); font-size: 15px; line-height: 1.6; margin-top: 8px; }
  .hint-letters {
    font-family: "SF Mono", Menlo, monospace; font-size: 26px; letter-spacing: 6px;
    text-align: center; margin: 18px 0 6px; font-weight: 600;
  }
  .hint-len { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 14px; }
  input.spell {
    width: 100%; padding: 14px; font-size: 20px; text-align: center;
    border: 1.5px solid var(--line); border-radius: 12px; outline: none;
    font-family: "SF Mono", Menlo, monospace; letter-spacing: 2px;
    background: var(--card); color: var(--ink);
  }
  input.spell:focus { border-color: var(--accent); }
  input.spell.ok { border-color: var(--accent); background: var(--accent-soft); }
  input.spell.bad { border-color: var(--wrong); background: var(--wrong-soft); }
  .feedback { min-height: 76px; margin-top: 14px; text-align: center; font-size: 15px; line-height: 1.6; }
  .feedback .word { font-size: 20px; font-weight: 700; }
  .feedback .ex { color: var(--sub); font-size: 14px; }

  /* 例句填空模式 */
  .q-sentence { font-size: 20px; line-height: 2; text-align: center; margin: 14px 4px 18px; color: var(--ink); }
  .q-sentence .blank { white-space: nowrap; }
  .q-sentence .bk-hint { display: inline-block; min-width: 15px; border-bottom: 2px solid var(--accent); color: var(--accent); font-weight: 700; text-align: center; }
  .q-sentence .bk-line { display: inline-block; width: 15px; border-bottom: 2px solid var(--sub); margin: 0 1px; }
  .q-sentence .bk-space { display: inline-block; width: 8px; }
  .q-sentence .q-def { font-style: italic; color: var(--sub); font-size: 16px; }

  .q-hint-pill { text-align: center; background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 11px 18px; font-size: 17px; margin-bottom: 20px; }
  .q-hint-pill .pos { color: var(--gold); font-weight: 600; margin-right: 6px; }

  .q-pool { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 16px; min-height: 48px; }
  .pool-letter { min-width: 46px; height: 50px; border-radius: 10px; background: var(--card); border: 1px solid var(--line); font-size: 21px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.06); transition: transform .06s; }
  .pool-letter:active { transform: scale(.92); }
  .pool-letter.used { opacity: 0; pointer-events: none; }

  .q-answer { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 44px; margin-bottom: 10px; }
  .ans-slot { width: 34px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; }
  .ans-slot.locked { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
  .ans-slot.filled { background: var(--card); border: 1.5px solid var(--accent); color: var(--ink); }
  .ans-slot.empty { background: var(--card); border: 1.5px dashed var(--line); }
  .ans-slot.ok { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .ans-slot.bad { background: var(--wrong-soft); border-color: var(--wrong); color: var(--wrong); }
  .ans-space { width: 14px; }
  .q-status { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 10px; min-height: 18px; }

  /* 英翻中選擇題模式 */
  .q-sentence .hl { color: var(--accent); font-weight: 700; border-bottom: 2px solid var(--accent); padding: 0 2px; }
  .q-choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .zh-opt {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px 16px; font-size: 17px; line-height: 1.5; text-align: center; cursor: pointer;
  }
  .zh-opt.ok { background: var(--accent-soft); border-color: var(--accent); }
  .zh-opt.bad { background: var(--wrong-soft); border-color: var(--wrong); }
  .zh-opt:disabled { color: var(--ink); opacity: 1; cursor: default; }

  .result { text-align: center; }
  .result .big { font-size: 52px; font-weight: 700; margin: 24px 0 4px; }
  .result .msg { color: var(--sub); margin-bottom: 24px; }
  .review { text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 4px 16px; margin-bottom: 24px; }
  .review-item { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .review-item:last-child { border-bottom: none; }
  .review-item b { font-size: 17px; }
  .review-item div { color: var(--sub); font-size: 14px; margin-top: 3px; line-height: 1.5; }
</style>
</head>
<body>

<div id="home">
  <h1 class="app-title">字寶</h1>
  <p class="sub" id="homeSub"></p>

  <div class="search-wrap">
    <div class="search-bar">
      <span class="s-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="輸入英文單字，加入單字庫" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="s-btn" onclick="lookup()">查詢</button>
    </div>
    <div id="searchResult"></div>
  </div>

  <div class="panel" id="settings">
    <div class="field">
      <label>練習類型</label>
      <div class="choices" id="typeChoices">
        <button class="choice active" data-v="spell">✏️ 英文拼音</button>
        <button class="choice" data-v="zh">🈶 英翻中</button>
      </div>
    </div>
    <div class="field">
      <label>練習範圍</label>
      <div class="choices" id="sourceChoices">
        <button class="choice active" data-v="mine">📚 單字庫</button>
        <button class="choice" data-v="dict">🎯 多益單字庫</button>
      </div>
    </div>
    <div class="field">
      <label>題數</label>
      <div class="choices" id="countChoices"></div>
    </div>
    <div class="field" id="hintField">
      <label>開頭字母提示</label>
      <div class="choices" id="hintChoices">
        <button class="choice" data-v="0">不提示</button>
        <button class="choice active" data-v="1">1 個字母</button>
        <button class="choice" data-v="2">2 個字母</button>
        <button class="choice" data-v="3">3 個字母</button>
      </div>
    </div>
    <button class="btn primary" onclick="startQuiz()">開始練習</button>
  </div>

  <button class="library-btn" onclick="openLibrary()">📚 單字庫</button>
  <button class="library-btn" style="margin-top: 10px" onclick="openDictLibrary()">🎯 多益單字庫</button>
</div>

<div id="library" class="hidden">
  <div class="topbar">
    <button class="back" onclick="goHome()">← 返回</button>
    <span class="progress-text" id="libCount"></span>
  </div>
  <h1 class="lib-title">📚 單字庫</h1>
  <div id="vocabList"></div>
</div>

<div id="dictLib" class="hidden">
  <div class="topbar">
    <button class="back" onclick="goHome()">← 返回</button>
    <span class="progress-text" id="dictCount"></span>
  </div>
  <h1 class="lib-title">🎯 多益單字庫</h1>
  <div id="dictList"></div>
</div>

<div id="letterPage" class="hidden">
  <div class="topbar">
    <button class="back" onclick="backFromLetter()">← 返回</button>
    <span class="progress-text" id="letterCount"></span>
  </div>
  <h1 class="lib-title" id="letterTitle"></h1>
  <div id="letterList"></div>
</div>

<div id="quiz" class="hidden">
  <div class="topbar">
    <button class="back" onclick="goHome()">← 離開</button>
    <span class="progress-text" id="qProgress"></span>
  </div>
  <div class="bar"><div id="qBar"></div></div>

  <!-- 第一排：例句題目（單字挖空） -->
  <div class="q-sentence" id="qSentence"></div>

  <!-- 第二排：中文意思提示（英翻中模式隱藏） -->
  <div class="q-hint-pill" id="qHintPill"><span class="pos" id="qPos"></span><span id="qZh"></span></div>

  <!-- 英翻中模式：三選一中文選項 -->
  <div class="q-choices hidden" id="qChoices"></div>

  <!-- 第三排：打散的英文字母 -->
  <div class="q-pool" id="qPool"></div>

  <!-- 第四排：輸入答案的地方 -->
  <div class="q-answer" id="qAnswer"></div>
  <div class="q-status" id="qStatus"></div>

  <div class="feedback" id="qFeedback"></div>
  <div class="btn-row">
    <button class="btn" id="qBackspace" style="flex:0 0 auto; width:64px;" onclick="popLetter()">⌫</button>
    <button class="btn primary" id="qCheckBtn" onclick="check()">確認</button>
  </div>
</div>

<div id="detailOverlay" class="overlay hidden" onclick="if (event.target === this) closeDetail()">
  <div class="detail">
    <div class="dtop">
      <span class="dword" id="dWord"></span>
      <span class="dphon" id="dPhon"></span>
      <button class="speak" onclick="speak(document.getElementById('dWord').textContent)">🔊</button>
    </div>
    <div class="dzh"><b id="dPos"></b><span id="dZh"></span></div>
    <div class="section"><div class="label">英文釋義</div><div class="val" id="dEn"></div></div>
    <div class="section"><div class="label">例句</div><div class="val"><em id="dEx"></em></div></div>
    <div class="section"><div class="label">考試 / 口語用法</div><div class="val" id="dUsage"></div></div>
    <div class="section"><div class="label">相似字比較</div><div class="val" id="dSyn"></div></div>
    <div class="dfoot" id="dAdded"></div>
    <div class="btn-row">
      <button class="btn hidden" id="dRemoveBtn" onclick="removeCurrent()">🗑 移除</button>
      <button class="btn" onclick="closeDetail()">關閉</button>
    </div>
  </div>
  <button class="nav-arrow left" id="dPrev" onclick="stepDetail(-1)">‹</button>
  <button class="nav-arrow right" id="dNext" onclick="stepDetail(1)">›</button>
</div>

<div id="result" class="hidden">
  <div class="result">
    <div class="big" id="rScore"></div>
    <div class="msg" id="rMsg"></div>
    <div class="review" id="rReview"></div>
    <div class="btn-row">
      <button class="btn" onclick="goHome()">回設定</button>
      <button class="btn primary" onclick="startQuiz()">再練一次</button>
    </div>
  </div>
</div>

<script src="vocab.js"></script>
<script src="dict.js"></script>
<script>
let opts = { qtype: "spell", source: "mine", count: 5, hint: 1 };

function practicePool() {
  if (opts.source === "dict" && typeof DICT !== "undefined") {
    // 只出中譯乾淨的題目；內容還在整理中的字先跳過
    return DICT.filter(d => d.enriched || (/[一-鿿]/.test(d.zh) && d.zh.length <= 60 && d.zh !== "（內容整理中）"));
  }
  return allWords();
}
let cur = { list: [], idx: 0, wrong: [], answered: false };

// ===== 手動新增的單字（存在這台裝置的瀏覽器） =====
const CUSTOM_KEY = "toeicCustomWords";
function loadCustom() { try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]"); } catch (e) { return []; } }
function saveCustom(list) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list)); }
function cleanCustom() { // 已被正式收錄的字自動移除暫存版；字典補完內容後自動升級暫存字
  let list = loadCustom().filter(c => !VOCAB.some(v => v.w.toLowerCase() === c.w.toLowerCase()));
  if (typeof DICT !== "undefined") {
    list = list.map(c => {
      const d = DICT.find(x => x.enriched && x.w.toLowerCase() === c.w.toLowerCase());
      if (!d) return c;
      const up = Object.assign({}, d, { custom: true, added: c.added });
      delete up.enriched;
      return up;
    });
  }
  saveCustom(list);
}
function allWords() { return VOCAB.concat(loadCustom()); }

const POS_MAP = { noun: "n.", verb: "v.", adjective: "adj.", adverb: "adv.", preposition: "prep.", conjunction: "conj.", interjection: "int.", pronoun: "pron." };

async function lookup() {
  const input = document.getElementById("searchInput");
  const box = document.getElementById("searchResult");
  const word = input.value.trim().toLowerCase();
  if (!word || !/^[a-z][a-z' -]*$/.test(word)) { box.innerHTML = "<div class='s-msg'>請輸入英文單字</div>"; return; }
  if (allWords().some(v => v.w.toLowerCase() === word)) { box.innerHTML = "<div class='s-msg'>「" + word + "」已經在單字庫裡了</div>"; return; }

  // 優先查內建多益字典
  const dictHit = (typeof DICT !== "undefined") ? DICT.find(d => d.w.toLowerCase() === word) : null;
  if (dictHit) {
    box.innerHTML = "";
    const card = document.createElement("div");
    card.className = "s-card";
    card.innerHTML = "<div class='s-word'>" + dictHit.w + (dictHit.phon ? " <span>/" + dictHit.phon + "/</span>" : "") +
      "<span class='badge'>" + (dictHit.enriched ? "多益核心字" : "多益核心字 · 詳細內容製作中") + "</span></div>" +
      "<div class='s-zh'>" + (dictHit.pos ? dictHit.pos + " " : "") + dictHit.zh + "</div>" +
      (dictHit.en ? "<div class='s-en'>" + dictHit.en + "</div>" : "") +
      (dictHit.ex ? "<div class='s-en'><em>" + dictHit.ex + "</em></div>" : "");
    const btn = document.createElement("button");
    btn.className = "btn primary";
    btn.textContent = "＋ 加入單字庫";
    btn.onclick = () => {
      const entry = Object.assign({}, dictHit, { custom: true, added: new Date().toISOString().slice(0, 10) });
      delete entry.enriched;
      if (!dictHit.enriched) entry.usage = "📖 多益核心字：詳細用法製作中，補完後會自動更新";
      const list = loadCustom();
      list.push(entry);
      saveCustom(list);
      input.value = "";
      renderHome();
      box.innerHTML = "<div class='s-msg'>✅ 已加入單字庫的 " + dictHit.w[0].toUpperCase() + " 書籤！</div>";
    };
    card.appendChild(btn);
    box.appendChild(card);
    return;
  }
  box.innerHTML = "<div class='s-msg'>查詢中…</div>";
  try {
    const [dictRes, transRes] = await Promise.all([
      fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(word)),
      fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(word) + "&langpair=en|zh-TW")
    ]);
    if (!dictRes.ok) { box.innerHTML = "<div class='s-msg'>字典裡找不到「" + word + "」，請檢查拼字</div>"; return; }
    const dict = await dictRes.json();
    let zh = "";
    try { zh = (await transRes.json()).responseData.translatedText || ""; } catch (e) {}
    if (zh.toLowerCase() === word) zh = "";
    const meanings = dict[0].meanings || [];
    const phon = ((dict[0].phonetics || []).map(p => p.text).find(t => t) || "").replace(/^\/|\/$/g, "");
    const pos = meanings.map(m => POS_MAP[m.partOfSpeech] || m.partOfSpeech).slice(0, 2).join(" / ");
    const def = (meanings[0] && meanings[0].definitions[0]) ? meanings[0].definitions[0].definition : "";
    const withEx = meanings.flatMap(m => m.definitions).find(d => d.example);
    const entry = {
      w: word, pos: pos, phon: phon, zh: zh, en: def,
      ex: withEx ? withEx.example : "",
      usage: "📱 從網頁快速新增。下次把這個字丟給 Claude，就會補上考試/口語用法並正式收錄",
      syn: "", synNote: "", added: new Date().toISOString().slice(0, 10), custom: true
    };
    box.innerHTML = "";
    const card = document.createElement("div");
    card.className = "s-card";
    card.innerHTML = "<div class='s-word'>" + word + (phon ? " <span>/" + phon + "/</span>" : "") + "</div>" +
      "<div class='s-zh'>" + (pos ? pos + " " : "") + (zh || "（自動翻譯沒抓到中文，仍可加入）") + "</div>" +
      (def ? "<div class='s-en'>" + def + "</div>" : "");
    const btn = document.createElement("button");
    btn.className = "btn primary";
    btn.textContent = "＋ 加入單字庫";
    btn.onclick = () => {
      const list = loadCustom();
      list.push(entry);
      saveCustom(list);
      input.value = "";
      renderHome();
      box.innerHTML = "<div class='s-msg'>✅ 已加入單字庫的 " + word[0].toUpperCase() + " 書籤！（標「新」的字存在這台裝置上）</div>";
    };
    card.appendChild(btn);
    box.appendChild(card);
  } catch (e) {
    box.innerHTML = "<div class='s-msg'>查詢失敗，請確認網路後再試一次</div>";
  }
}

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function currentWord() { return cur.list[cur.idx]; }

function esc(s) { return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

// 在例句裡找出要挖空的字（優先完全相符，再找同字根的變化形，如 negotiate→negotiated）
function findFormInSentence(sentence, word) {
  if (!sentence) return null;
  const lc = sentence.toLowerCase(), wl = word.toLowerCase();
  let i = lc.indexOf(wl);
  while (i >= 0) {
    const beforeOk = i === 0 || !/[a-z]/i.test(sentence[i - 1]);
    const afterCh = sentence[i + wl.length];
    const afterOk = afterCh === undefined || !/[a-z]/i.test(afterCh);
    if (beforeOk && afterOk) return sentence.substr(i, wl.length);
    i = lc.indexOf(wl, i + 1);
  }
  if (!word.includes(" ") && wl.length >= 4) {
    let best = null, bestLen = 0;
    for (const m of sentence.matchAll(/[A-Za-z]+/g)) {
      const t = m[0], tl = t.toLowerCase();
      let p = 0;
      while (p < tl.length && p < wl.length && tl[p] === wl[p]) p++;
      if (p >= Math.min(4, wl.length - 1) && Math.abs(tl.length - wl.length) <= 3 && p > bestLen) { best = t; bestLen = p; }
    }
    return best;
  }
  return null;
}

function renderQuestion() {
  const v = currentWord();
  const total = cur.list.length;
  cur.answered = false;
  document.getElementById("qProgress").textContent = (cur.idx + 1) + " / " + total;
  document.getElementById("qBar").style.width = (cur.idx / total * 100) + "%";

  // 依練習類型切換顯示的區塊
  const zhMode = opts.qtype === "zh";
  document.getElementById("qHintPill").classList.toggle("hidden", zhMode);
  document.getElementById("qChoices").classList.toggle("hidden", !zhMode);
  document.getElementById("qPool").classList.toggle("hidden", zhMode);
  document.getElementById("qAnswer").classList.toggle("hidden", zhMode);
  document.getElementById("qBackspace").style.display = zhMode ? "none" : "";
  if (zhMode) { renderZhQuestion(v); return; }

  document.getElementById("qPos").textContent = v.pos || "";
  document.getElementById("qZh").textContent = v.zh || "";

  // 答案：優先用例句裡出現的字形
  const form = findFormInSentence(v.ex, v.w) || v.w;
  cur.answer = form;
  cur.answerLc = form.toLowerCase();

  // 鎖定的位置＝前 N 個提示字母 + 空格（片語用）
  const letterLen = form.replace(/ /g, "").length;
  const hintCount = Math.min(opts.hint, Math.max(0, letterLen - 1));
  cur.locked = [];
  let seen = 0;
  for (let i = 0; i < form.length; i++) {
    if (form[i] === " ") cur.locked[i] = true;
    else { cur.locked[i] = seen < hintCount; seen++; }
  }
  cur.filled = form.split("").map((ch, i) => cur.locked[i] ? ch : null);
  const poolChars = [];
  for (let i = 0; i < form.length; i++) if (!cur.locked[i]) poolChars.push(form[i]);
  cur.pool = shuffle(poolChars).map(ch => ({ ch, used: false }));
  cur.placed = [];

  renderSentence(v, form, hintCount);
  renderPool();
  renderAnswer();

  document.getElementById("qFeedback").innerHTML = "";
  document.getElementById("qStatus").textContent = "點下方字母，或直接用鍵盤打字";
  document.getElementById("qCheckBtn").textContent = "確認";
  document.getElementById("qBackspace").style.visibility = "visible";
}

// ===== 英翻中選擇題模式 =====
function zhDistractors(v) {
  const clean = x => x.w !== v.w && x.zh && x.zh !== v.zh && x.zh !== "（內容整理中）";
  let pool = practicePool().filter(clean);
  if (pool.length < 2 && typeof DICT !== "undefined") pool = DICT.filter(clean);
  return shuffle(pool.slice()).slice(0, 2).map(x => x.zh);
}

function renderZhQuestion(v) {
  const form = findFormInSentence(v.ex, v.w) || v.w;
  cur.answer = form;
  cur.pool = [];
  cur.placed = [];

  // 題目：例句中把單字標色保留
  const el = document.getElementById("qSentence");
  const sentence = v.ex || "";
  const idx = sentence.indexOf(form);
  if (idx >= 0) {
    el.innerHTML = esc(sentence.slice(0, idx)) + "<span class='hl'>" + esc(form) + "</span>" + esc(sentence.slice(idx + form.length));
  } else {
    el.innerHTML = "<span class='hl'>" + esc(v.w) + "</span>" + (v.en ? "<br><span class='q-def'>" + esc(v.en) + "</span>" : "");
  }

  // 三個選項：一個正解＋兩個隨機別字的中文
  const box = document.getElementById("qChoices");
  box.innerHTML = "";
  const options = shuffle([{ zh: v.zh, ok: true }].concat(zhDistractors(v).map(zh => ({ zh: zh, ok: false }))));
  options.forEach(o => {
    const b = document.createElement("button");
    b.className = "zh-opt";
    b.textContent = o.zh;
    if (o.ok) b.dataset.correct = "1";
    b.onclick = () => answerZh(b, o.ok, v);
    box.appendChild(b);
  });

  document.getElementById("qFeedback").innerHTML = "";
  document.getElementById("qStatus").textContent = "選出正確的中文意思（電腦可按 1 / 2 / 3）";
  document.getElementById("qCheckBtn").textContent = "確認";
}

function answerZh(btn, ok, v) {
  if (cur.answered) return;
  cur.answered = true;
  if (!ok) cur.wrong.push(v);
  document.querySelectorAll("#qChoices .zh-opt").forEach(b => {
    b.disabled = true;
    if (b.dataset.correct) b.classList.add("ok");
  });
  if (!ok) btn.classList.add("bad");
  document.getElementById("qStatus").textContent = "";
  document.getElementById("qFeedback").innerHTML =
    (ok ? "✅ 正確！" : "❌ 正確答案是綠色那個") +
    "<span class='word'> " + esc(v.w) + "</span> /" + (v.phon || "") + "/<br>" +
    "<span class='ex'>" + esc(v.pos || "") + " " + esc(v.zh || "") + "</span>";
  document.getElementById("qCheckBtn").textContent = cur.idx + 1 < cur.list.length ? "下一題 →" : "看成績";
  speak(cur.answer || v.w);
}

function renderSentence(v, form, hintCount) {
  const el = document.getElementById("qSentence");
  const sentence = v.ex || "";
  const idx = sentence.indexOf(form);
  if (idx < 0) {
    el.innerHTML = "<span class='q-def'>" + (esc(v.en) || "根據提示拼出單字") + "</span>";
    return;
  }
  let blank = "", seen = 0;
  for (let i = 0; i < form.length; i++) {
    if (form[i] === " ") { blank += "<span class='bk-space'></span>"; continue; }
    blank += seen < hintCount ? "<span class='bk-hint'>" + form[i] + "</span>" : "<span class='bk-line'></span>";
    seen++;
  }
  el.innerHTML = esc(sentence.slice(0, idx)) + "<span class='blank'>" + blank + "</span>" + esc(sentence.slice(idx + form.length));
}

function renderPool() {
  const el = document.getElementById("qPool");
  el.innerHTML = "";
  cur.pool.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "pool-letter" + (p.used ? " used" : "");
    b.textContent = p.ch;
    b.onclick = () => tapLetter(i);
    el.appendChild(b);
  });
}

function renderAnswer() {
  const el = document.getElementById("qAnswer");
  el.innerHTML = "";
  for (let i = 0; i < cur.answer.length; i++) {
    if (cur.answer[i] === " ") { const g = document.createElement("span"); g.className = "ans-space"; el.appendChild(g); continue; }
    const t = document.createElement("span");
    const ch = cur.filled[i];
    if (cur.locked[i]) { t.className = "ans-slot locked"; t.textContent = ch; }
    else if (ch != null) { t.className = "ans-slot filled"; t.textContent = ch; }
    else { t.className = "ans-slot empty"; }
    el.appendChild(t);
  }
}

function nextEmptySlot() {
  for (let i = 0; i < cur.answer.length; i++)
    if (!cur.locked[i] && cur.answer[i] !== " " && cur.filled[i] == null) return i;
  return -1;
}

function tapLetter(poolIdx) {
  if (cur.answered) return;
  const p = cur.pool[poolIdx];
  if (p.used) return;
  const slot = nextEmptySlot();
  if (slot < 0) return;
  cur.filled[slot] = p.ch;
  p.used = true;
  cur.placed.push({ slot, poolIdx });
  renderPool();
  renderAnswer();
}

function popLetter() {
  if (cur.answered) return;
  const last = cur.placed.pop();
  if (!last) return;
  cur.filled[last.slot] = null;
  cur.pool[last.poolIdx].used = false;
  renderPool();
  renderAnswer();
}

function typeLetter(ch) {
  ch = ch.toLowerCase();
  for (let i = 0; i < cur.pool.length; i++)
    if (!cur.pool[i].used && cur.pool[i].ch.toLowerCase() === ch) { tapLetter(i); return; }
}

function check() {
  if (cur.answered) { next(); return; }
  if (opts.qtype === "zh") { document.getElementById("qStatus").textContent = "先選一個答案喔"; return; }
  if (nextEmptySlot() >= 0) { document.getElementById("qStatus").textContent = "還沒填完喔"; return; }
  cur.answered = true;
  const v = currentWord();
  const ok = cur.filled.join("").toLowerCase() === cur.answerLc;
  if (!ok) cur.wrong.push(v);
  document.querySelectorAll("#qAnswer .ans-slot").forEach(s => {
    if (!s.classList.contains("locked")) s.classList.add(ok ? "ok" : "bad");
  });
  document.getElementById("qStatus").textContent = "";
  document.getElementById("qFeedback").innerHTML =
    (ok ? "✅ 正確！" : "❌ 正確答案：") +
    "<span class='word'> " + cur.answer + "</span> /" + (v.phon || "") + "/<br>" +
    "<span class='ex'>" + esc(v.pos) + " " + esc(v.zh) + "</span>";
  document.getElementById("qBackspace").style.visibility = "hidden";
  document.getElementById("qCheckBtn").textContent = cur.idx + 1 < cur.list.length ? "下一題 →" : "看成績";
  speak(cur.answer);
}

function next() {
  cur.idx++;
  if (cur.idx < cur.list.length) renderQuestion();
  else finish();
}

function finish() {
  const total = cur.list.length;
  const right = total - cur.wrong.length;
  const pct = Math.round(right / total * 100);
  document.getElementById("rScore").textContent = pct + "%";
  document.getElementById("rMsg").textContent =
    pct === 100 ? "全對！拼字滿分 🎉" : "答對 " + right + " / " + total + "，錯的字再看一眼";
  const rv = document.getElementById("rReview");
  if (cur.wrong.length) {
    rv.classList.remove("hidden");
    rv.innerHTML = cur.wrong.map(v =>
      '<div class="review-item"><b>' + v.w + "</b> <span style='color:var(--sub)'>/" + v.phon + "/</span><div>" +
      v.pos + " " + v.zh + "<br>" + v.ex + "</div></div>"
    ).join("");
  } else {
    rv.classList.add("hidden");
  }
  history.replaceState({ view: "result" }, "");
  show("result");
}

let detailWord = null;
let detailList = [];
let detailIndex = -1;

function stepDetail(dir) {
  const ni = detailIndex + dir;
  if (ni < 0 || ni >= detailList.length) return;
  showDetail(detailList[ni]);
}

function showDetail(v) {
  detailWord = v;
  detailIndex = detailList.findIndex(x => x.w === v.w);
  const hasList = detailIndex >= 0 && detailList.length > 1;
  document.getElementById("dPrev").classList.toggle("hidden", !hasList);
  document.getElementById("dNext").classList.toggle("hidden", !hasList);
  document.getElementById("dPrev").disabled = detailIndex <= 0;
  document.getElementById("dNext").disabled = detailIndex >= detailList.length - 1;
  document.getElementById("dWord").textContent = v.w;
  document.getElementById("dPhon").textContent = v.phon ? "/" + v.phon + "/" : "";
  document.getElementById("dPos").textContent = v.pos;
  document.getElementById("dZh").textContent = v.zh;
  document.getElementById("dEn").textContent = v.en || "（待補充）";
  document.getElementById("dEx").textContent = v.ex || "（待補充）";
  document.getElementById("dUsage").textContent = v.usage || "（詳細內容製作中，之後自動補上）";
  document.getElementById("dSyn").textContent = v.syn ? v.syn + "：" + v.synNote : "（待補充——把這個字丟給 Claude 就會補上）";
  document.getElementById("dAdded").textContent = "加入日期：" + v.added + (v.custom ? "（快速新增，存在此裝置）" : "");
  document.getElementById("dRemoveBtn").classList.toggle("hidden", !v.custom);
  document.getElementById("detailOverlay").classList.remove("hidden");
}
function closeDetail() { document.getElementById("detailOverlay").classList.add("hidden"); }
function removeCurrent() {
  if (!detailWord || !detailWord.custom) return;
  saveCustom(loadCustom().filter(c => c.w !== detailWord.w));
  closeDetail();
  renderHome();
  if (!document.getElementById("letterPage").classList.contains("hidden")) {
    openLetterPage(letterCtx.source, letterCtx.letter);
  }
}

function speak(word) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = "en-US";
    u.rate = 0.9;
    speechSynthesis.speak(u);
  } catch (e) {}
}

// 練習中的鍵盤操作：打字母＝填入配對的字母、Backspace＝退一格、Enter＝確認／下一題
document.addEventListener("keydown", e => {
  if (document.getElementById("quiz").classList.contains("hidden")) return;
  if (e.key === "Enter") { e.preventDefault(); check(); return; }
  if (cur.answered) return;
  if (opts.qtype === "zh") {
    if (/^[1-3]$/.test(e.key)) {
      const b = document.querySelectorAll("#qChoices .zh-opt")[+e.key - 1];
      if (b && !b.disabled) b.click();
    }
    return;
  }
  if (e.key === "Backspace") { e.preventDefault(); popLetter(); }
  else if (/^[a-zA-Z]$/.test(e.key)) { e.preventDefault(); typeLetter(e.key); }
});
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") lookup();
});

// 字卡上左右滑＝上一個／下一個單字；電腦可用鍵盤 ← → 鍵
const detailCard = document.querySelector("#detailOverlay .detail");
let cardTouch = null;
detailCard.addEventListener("touchstart", e => {
  if (e.touches[0].clientX < 30) return; // 左邊緣保留給「拖動返回」手勢
  cardTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
detailCard.addEventListener("touchend", e => {
  if (!cardTouch) return;
  const dx = e.changedTouches[0].clientX - cardTouch.x;
  const dy = Math.abs(e.changedTouches[0].clientY - cardTouch.y);
  cardTouch = null;
  if (Math.abs(dx) < 60 || Math.abs(dx) < dy * 1.5) return; // 捲動內文不觸發
  stepDetail(dx < 0 ? 1 : -1); // 往左滑＝下一個，往右滑＝上一個
}, { passive: true });

document.addEventListener("keydown", e => {
  if (document.getElementById("detailOverlay").classList.contains("hidden")) return;
  if (e.key === "ArrowRight") stepDetail(1);
  else if (e.key === "ArrowLeft") stepDetail(-1);
  else if (e.key === "Escape") closeDetail();
});

// ===== 手機：從畫面左邊緣拖動頁面返回（頁面跟著手指滑動，iOS 手感） =====
const BACKABLE = ["library", "dictLib", "letterPage", "result"];
let edgeDrag = null;

document.addEventListener("touchstart", e => {
  if (e.touches[0].clientX > 30) return; // 只從最左邊緣 30px 內開始才算
  const overlayOpen = !document.getElementById("detailOverlay").classList.contains("hidden");
  const view = BACKABLE.find(v => !document.getElementById(v).classList.contains("hidden"));
  if (!overlayOpen && !view) return;
  edgeDrag = {
    startX: e.touches[0].clientX,
    startY: e.touches[0].clientY,
    el: overlayOpen ? document.querySelector("#detailOverlay .detail") : document.getElementById(view),
    overlay: overlayOpen,
    active: false
  };
}, { passive: true });

document.addEventListener("touchmove", e => {
  if (!edgeDrag) return;
  const dx = e.touches[0].clientX - edgeDrag.startX;
  const dy = Math.abs(e.touches[0].clientY - edgeDrag.startY);
  if (!edgeDrag.active) {
    if (dx > 10 && dx > dy) { edgeDrag.active = true; edgeDrag.el.style.transition = "none"; }
    else if (dy > 10) { edgeDrag = null; return; } // 是上下捲動，放行
  }
  if (edgeDrag.active) {
    e.preventDefault();
    edgeDrag.el.style.transform = "translateX(" + Math.max(0, dx) + "px)";
  }
}, { passive: false });

document.addEventListener("touchend", e => {
  if (!edgeDrag) return;
  const drag = edgeDrag;
  edgeDrag = null;
  const dx = e.changedTouches[0].clientX - drag.startX;
  drag.el.style.transition = "transform .2s ease-out";
  if (drag.active && dx > window.innerWidth / 3) {
    drag.el.style.transform = "translateX(100%)"; // 滑出畫面再返回
    setTimeout(() => {
      drag.el.style.transition = "";
      drag.el.style.transform = "";
      if (drag.overlay) closeDetail();
      else history.back();
    }, 200);
  } else {
    drag.el.style.transform = ""; // 沒滑過門檻，彈回原位
    setTimeout(() => { drag.el.style.transition = ""; }, 200);
  }
}, { passive: true });

history.replaceState({ view: "home" }, "");
renderHome();
</script>
